<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .icon{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .icon svg{width:28px;height:28px;color:#0A0A0A;}
  .lbl{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4A4A4A;}
</style>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head><body>
<div class="wrap">
  <div class="icon"><i data-lucide="heart-handshake"></i><div class="lbl">Help</div></div>
  <div class="icon"><i data-lucide="shield"></i><div class="lbl">Defense</div></div>
  <div class="icon"><i data-lucide="file-text"></i><div class="lbl">Report</div></div>
  <div class="icon"><i data-lucide="users"></i><div class="lbl">Team</div></div>
  <div class="icon"><i data-lucide="truck"></i><div class="lbl">Delivery</div></div>
  <div class="icon"><i data-lucide="cross"></i><div class="lbl">Medic</div></div>
  <div class="icon"><i data-lucide="banknote"></i><div class="lbl">Donate</div></div>
  <div class="icon"><i data-lucide="mail"></i><div class="lbl">Contact</div></div>
  <div class="icon"><i data-lucide="calendar"></i><div class="lbl">Date</div></div>
  <div class="icon"><i data-lucide="map-pin"></i><div class="lbl">Place</div></div>
  <div class="icon"><i data-lucide="arrow-right"></i><div class="lbl">Forward</div></div>
  <div class="icon"><i data-lucide="download"></i><div class="lbl">Download</div></div>
</div>
<div style="padding:0 28px 20px;font-family:var(--font-sans);font-size:11px;color:#4A4A4A;font-weight:300;line-height:1.5;max-width:580px;">
  Lucide via CDN, stroke 1.75, currentColor. Substitute — Sensum has no proprietary icon set in materials we have.
</div>
<script>lucide.createIcons({ attrs: { 'stroke-width': 1.75 } });</script>
</body></html>
