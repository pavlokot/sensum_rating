<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#FAFAF7;font-family:var(--font-sans);}
  .wrap{padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .card{background:#fff;padding:24px;border:1px solid rgba(26,26,26,.08);}
  .num{font-family:var(--font-sans);font-size:42px;font-weight:600;color:#0A0A0A;line-height:1;}
  .label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4A4A4A;margin-top:8px;}
  .accent{background:#E1CC01;border:0;}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="num">2 480 000 ₴</div>
    <div class="label">Зібрано за червень</div>
  </div>
  <div class="card accent">
    <div class="num">93</div>
    <div class="label">Бригада · доставлено</div>
  </div>
</div>
</body></html>
