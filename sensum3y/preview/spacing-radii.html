<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;gap:32px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:80px;height:80px;background:#E1CC01;}
  .lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4A4A4A;}
  .px{font-family:var(--font-mono);font-size:10px;color:#8A8A8A;}
</style></head><body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">r-0 (default)</div><div class="px">0 px</div></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">r-sm</div><div class="px">2 px</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">r-md (UI)</div><div class="px">4 px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">r-lg</div><div class="px">8 px</div></div>
</div>
<div style="padding:0 28px 24px;font-family:var(--font-sans);font-size:11px;color:#4A4A4A;font-weight:300;line-height:1.5;max-width:580px;">
  Sharp corners are on-brand. Use r-0 for hero blocks, photo frames, and quote panels. r-md only for buttons / inputs. Avoid pills.
</div>
</body></html>
