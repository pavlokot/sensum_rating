<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;border-radius:0;}
  .b-y{background:#E1CC01;color:#0A0A0A;}
  .b-cream{background:#F8F1BB;color:#0A0A0A;}
  .b-ink{background:#0A0A0A;color:#fff;}
  .b-out{background:transparent;color:#0A0A0A;border:1px solid #0A0A0A;}
  .dot{width:6px;height:6px;background:currentColor;}
</style></head><body>
<div class="wrap">
  <span class="badge b-y"><span class="dot"></span>Активна кампанія</span>
  <span class="badge b-cream">Червень 2024</span>
  <span class="badge b-ink">Завершено</span>
  <span class="badge b-out">УБД</span>
</div>
</body></html>
