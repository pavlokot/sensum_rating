<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{height:90px;border-radius:0;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .sw .name{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
  .sw .hex{font-size:10px;letter-spacing:.05em;opacity:.7;font-family:var(--font-mono);}
  .light{color:#0A0A0A;}.dark{color:#fff;}
</style></head><body>
<div class="wrap">
  <div class="sw dark" style="background:#0A0A0A"><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
  <div class="sw dark" style="background:#1A1A1A"><div class="name">Ink 2</div><div class="hex">#1A1A1A</div></div>
  <div class="sw dark" style="background:#4A4A4A"><div class="name">Ink 3</div><div class="hex">#4A4A4A</div></div>
  <div class="sw dark" style="background:#8A8A8A"><div class="name">Ink 4</div><div class="hex">#8A8A8A</div></div>
  <div class="sw light" style="background:#FAFAF7;border:1px solid rgba(0,0,0,.06)"><div class="name">Paper 2</div><div class="hex">#FAFAF7</div></div>
  <div class="sw light" style="background:#FFFFFF;border:1px solid rgba(0,0,0,.12)"><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
  <div class="sw light" style="background:rgba(26,26,26,.12);border:0"><div class="name">Line</div><div class="hex">#1A1A1A 12%</div></div>
  <div class="sw light" style="background:rgba(26,26,26,.24);border:0"><div class="name">Line strong</div><div class="hex">#1A1A1A 24%</div></div>
</div></body></html>
