<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;}
  .wrap{padding:24px;}
  .row{display:flex;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06);}
  .row:last-child{border-bottom:0;}
  .lbl{font-family:var(--font-sans);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4A4A4A;width:60px;}
  .bar{background:#E1CC01;height:14px;}
  .px{font-family:var(--font-mono);font-size:11px;color:#8A8A8A;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="lbl">s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="lbl">s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="lbl">s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="lbl">s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="lbl">s-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="lbl">s-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="lbl">s-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="lbl">s-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="lbl">s-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
</div></body></html>
