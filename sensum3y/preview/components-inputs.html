<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:680px;}
  label{display:block;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#4A4A4A;margin-bottom:6px;}
  input,select{width:100%;padding:12px 14px;font-family:var(--font-sans);font-size:14px;color:#0A0A0A;background:#fff;border:1px solid rgba(26,26,26,.24);border-radius:4px;outline:none;box-sizing:border-box;}
  input:focus{border-color:#0A0A0A;}
  .help{font-size:11px;color:#4A4A4A;font-weight:300;margin-top:4px;}
</style></head><body>
<div class="wrap">
  <div>
    <label>Ім'я</label>
    <input type="text" placeholder="Іван Петренко"/>
  </div>
  <div>
    <label>Сума внеску, ₴</label>
    <input type="text" value="500"/>
  </div>
  <div>
    <label>Електронна пошта</label>
    <input type="email" placeholder="ivan@example.com"/>
  </div>
  <div>
    <label>Призначення</label>
    <select><option>Загальна підтримка</option><option>УБД</option><option>Дрони</option></select>
  </div>
</div>
</body></html>
