<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
</style></head><body>
<div class="wrap">
  <button class="sensum-btn sensum-btn--primary">Підтримати фонд</button>

</div>
<div style="padding:0 28px 24px;font-family:var(--font-sans);font-size:11px;color:#4A4A4A;font-weight:300;line-height:1.5;max-width:580px;">
