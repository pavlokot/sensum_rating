<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .sw{aspect-ratio:1;border-radius:0;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
  .sw .name{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
  .sw .hex{font-size:10px;letter-spacing:.05em;opacity:.7;font-family:var(--font-mono);}
  .light{color:#0A0A0A;}.dark{color:#fff;}
</style></head><body>
<div class="wrap">
  <div class="sw light" style="background:#E1CC01"><div class="name">Sensum Yellow</div><div class="hex">#E1CC01</div></div>
  <div class="sw light" style="background:#F8F1BB"><div class="name">Cream</div><div class="hex">#F8F1BB</div></div>
  <div class="sw dark"  style="background:#999361"><div class="name">Olive</div><div class="hex">#999361</div></div>
  <div class="sw dark"  style="background:#0A0A0A"><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
  <div class="sw light" style="background:#FFFFFF;border:1px solid rgba(0,0,0,.12)"><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
</div></body></html>
