<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;align-items:center;gap:32px;}
  .row{display:flex;gap:12px;align-items:center;}
  .chip{width:60px;height:60px;}
  .y100{background:#E1CC01;}
  .y80 {background:#E7D434;}
  .y60 {background:#EEDD67;}
  .y40 {background:#F4E699;}
  .y20 {background:#FBF4CC;}
  .label{font-size:10px;text-align:center;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#4A4A4A;margin-top:6px;}
  .col{display:flex;flex-direction:column;align-items:center;}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="chip y100"></div><div class="label">100</div></div>
  <div class="col"><div class="chip y80"></div><div class="label">80</div></div>
  <div class="col"><div class="chip y60"></div><div class="label">60</div></div>
  <div class="col"><div class="chip y40"></div><div class="label">40</div></div>
  <div class="col"><div class="chip y20"></div><div class="label">20</div></div>
  <div style="border-left:1px solid rgba(0,0,0,.12);padding-left:32px;">
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:#0A0A0A;">Yellow tints</div>
    <div style="font-family:var(--font-sans);font-size:11px;color:#4A4A4A;font-weight:300;margin-top:4px;max-width:240px;line-height:1.5;">
      For backgrounds & accent fills. Use 100 for primary CTAs and brand panels; 20–40 for soft highlights.
    </div>
  </div>
</div></body></html>
