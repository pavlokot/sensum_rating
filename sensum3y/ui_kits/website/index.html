<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <title>Sensum Foundation</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; font-family: "Oswald", sans-serif; color: #0A0A0A; }
    * { box-sizing: border-box; }
    button, a { font-family: inherit; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="SiteChrome.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [active, setActive] = useState("home");
      const [thanks, setThanks] = useState(false);

      const handleNav = (k) => {
        setActive(k);
        const map = {
          home: "top",
          programs: "programs",
          reports: "reports",
          team: "quote",
          contact: "donate",
          donate: "donate",
        };
        const id = map[k];
        if (id === "top") window.scrollTo({ top: 0, behavior: "smooth" });
        else document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      const handleDonate = () => {
        setThanks(true);
        setTimeout(() => setThanks(false), 2400);
      };

      return (
        <>
          <SiteHeader active={active} onNav={handleNav}/>
          <main>
            <div id="top"><Hero onDonate={() => handleNav("donate")}/></div>
            <StatsBar/>
            <div id="programs"><ProgramsSection/></div>
            <div id="quote"><QuoteSection/></div>
            <div id="reports"><ReportsSection/></div>
            <div id="donate"><DonateSection onSubmit={handleDonate}/></div>
          </main>
          <SiteFooter/>

          {thanks && (
            <div style={{
              position: "fixed", bottom: 32, left: "50%", transform: "translateX(-50%)",
              background: "#E1CC01", color: "#0A0A0A", padding: "18px 32px", borderRadius: 4,
              fontSize: 13, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.08em",
              boxShadow: "0 8px 24px rgba(0,0,0,0.16)", zIndex: 100,
            }}>
              Дякуємо за ваш внесок ✓
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
