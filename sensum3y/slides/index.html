<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <title>Sensum · Slide samples</title>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <style>
    html, body { margin: 0; background: #1a1a1a; font-family: "Oswald", sans-serif; }
    deck-stage::part(slide-counter) { color: #fff; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../deck-stage.js"></script>
</head>
<body>
  <deck-stage id="stage"></deck-stage>

  <script type="text/babel" src="SlideShared.jsx"></script>
  <script type="text/babel" src="TitleSlide.jsx"></script>
  <script type="text/babel" src="QuoteSlide.jsx"></script>
  <script type="text/babel" src="StatsSlide.jsx"></script>
  <script type="text/babel" src="SectionSlide.jsx"></script>
  <script type="text/babel" src="ComparisonSlide.jsx"></script>
  <script type="text/babel" src="CTASlide.jsx"></script>
  <script type="text/babel">
    function Deck() {
      return (
        <>
          <TitleSlide />
          <QuoteSlide />
          <StatsSlide />
          <SectionSlide />
          <ComparisonSlide />
          <CTASlide />
        </>
      );
    }
    const stage = document.getElementById("stage");
    const root = ReactDOM.createRoot(stage);
    root.render(<Deck />);
  </script>
</body>
</html>
